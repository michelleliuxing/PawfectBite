spring.application.name=pawfectbite

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/pawfectbite}
spring.datasource.username=${DATABASE_USERNAME:pawfectbite}
spring.datasource.password=${DATABASE_PASSWORD:pawfectbite}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Jackson (3.x) -- date/deserialization settings handled by our Jackson 2.x ObjectMapper bean
spring.jackson.default-property-inclusion=non_null

# JWT
app.jwt.secret=${JWT_SECRET:change-me-in-production-this-must-be-at-least-256-bits-long-for-hs256}
app.jwt.expiration-ms=86400000

# Google OAuth
app.google.client-id=${GOOGLE_CLIENT_ID:}

# OpenAI
app.openai.api-key=${OPENAI_API_KEY:}
app.openai.model=gpt-4o
app.openai.max-tokens=4096

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Server
server.port=${PORT:8080}
