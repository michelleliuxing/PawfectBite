services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pawfectbite-db
    environment:
      POSTGRES_DB: pawfectbite
      POSTGRES_USER: pawfectbite
      POSTGRES_PASSWORD: pawfectbite
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pawfectbite"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
